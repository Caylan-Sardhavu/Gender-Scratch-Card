<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gender Reveal · Kyle &amp; Noelene</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --neutral-1:#f6efe6; --neutral-2:#e7d9c6;
    --blue:#8fc7ff; --blue-deep:#2f7fdc;
    --pink:#ffb6d5; --pink-deep:#ff4f9a;
    --ink:#5b4a42;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Quicksand',sans-serif;
    background:radial-gradient(circle at 30% 15%,#fdf6ee,#efe2d2 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:16px;color:var(--ink);overflow-x:hidden;
  }
  .stage{width:100%;max-width:420px;text-align:center;}
  .headline{font-family:'Dancing Script',cursive;font-size:clamp(30px,7vw,42px);margin:0 0 2px;color:#8a7161;font-weight:700;}
  .subline{font-size:14px;letter-spacing:.4px;margin:0 0 10px;color:#a3907f;}

  .vs{display:flex;justify-content:space-between;width:300px;margin:0 auto 6px;font-weight:700;font-size:14px;letter-spacing:1px;}
  .vs .boy{color:#9db8d6;transition:color .3s,text-shadow .3s;}
  .vs .girl{color:#e0a6c2;transition:color .3s,text-shadow .3s;}
  .vs .boy.lead{color:var(--blue-deep);text-shadow:0 0 10px rgba(47,127,220,.6);}
  .vs .girl.lead{color:var(--pink-deep);text-shadow:0 0 10px rgba(255,79,154,.6);}

  /* ---------- Card: rectangular blue/pink blocks with the foot on top ---------- */
  .foot{position:relative;width:344px;height:424px;margin:0 auto;filter:drop-shadow(0 16px 24px rgba(120,90,70,.4));}
  @media (max-width:380px){ .foot{transform:scale(.9);transform-origin:top center;} }

  /* the two rectangular blocks */
  .board{position:absolute;inset:0;z-index:1;border-radius:26px;overflow:hidden;
    background:linear-gradient(180deg,#ffc9e0,#ff4f9a);}         /* pink base (right/winner) */
  .board .blue{position:absolute;left:0;top:0;bottom:0;width:50%;
    background:linear-gradient(180deg,#a9d4ff,#2f7fdc);
    box-shadow:3px 0 0 rgba(255,255,255,.55);transition:width .3s linear;}

  .layer{position:absolute;top:22px;left:22px;width:300px;height:380px;}

  .scene{
    z-index:2;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-size:100% 100%;mask-size:100% 100%;
    background:linear-gradient(160deg,var(--neutral-1),var(--neutral-2));
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  }
  .status{font-size:25px;font-weight:700;letter-spacing:.3px;color:#6f5a4c;min-height:1.2em;transition:color .6s ease,transform .3s ease;text-shadow:0 1px 1px rgba(255,255,255,.6);}
  .status .dots span{opacity:0;animation:blink 1.4s infinite;}
  .status .dots span:nth-child(2){animation-delay:.2s;}
  .status .dots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,100%{opacity:.15;}50%{opacity:1;}}

  #scratch{z-index:3;width:300px;height:380px;touch-action:none;cursor:grab;transition:opacity .55s ease;}
  #scratch.gone{opacity:0;pointer-events:none;}

  .hint{
    position:absolute;left:22px;right:22px;bottom:60px;z-index:4;text-align:center;
    color:#6b5320;font-weight:700;font-size:13px;letter-spacing:1px;
    text-shadow:0 1px 2px rgba(255,255,255,.5);pointer-events:none;transition:opacity .4s;
  }
  .hint.gone{opacity:0;}

  /* girly finish — message shown on the full pink rectangular block */
  .final{
    position:absolute;inset:0;z-index:5;border-radius:26px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:22px;text-align:center;
    background:linear-gradient(160deg,#ffe4f0,#ffb6d5 78%);
    opacity:0;transform:scale(.94);pointer-events:none;transition:opacity .7s ease,transform .7s ease;
  }
  .final.show{opacity:1;transform:scale(1);}
  .final .crown{font-size:34px;margin-bottom:4px;}
  .final .blessed{font-family:'Dancing Script',cursive;font-size:30px;color:#c14f88;font-weight:700;line-height:1.05;}
  .final .names{font-weight:700;font-size:19px;color:#a8608a;margin-bottom:8px;}
  .final .girl{font-family:'Dancing Script',cursive;font-weight:700;font-size:clamp(48px,13vw,64px);color:var(--pink-deep);text-shadow:0 3px 12px rgba(255,95,162,.4);line-height:1;}
  .final .foot-emoji{font-size:30px;margin-top:8px;}

  .replay{
    margin-top:18px;border:none;background:#fff;color:#a8608a;font-family:'Quicksand',sans-serif;
    font-weight:600;font-size:14px;padding:11px 24px;border-radius:30px;cursor:pointer;
    box-shadow:0 8px 18px -8px rgba(160,110,140,.6);opacity:0;pointer-events:none;transition:opacity .5s,transform .15s;
  }
  .replay.show{opacity:1;pointer-events:auto;}
  .replay:active{transform:scale(.95);}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:30;}
</style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs><clipPath id="footClip" clipPathUnits="userSpaceOnUse"></clipPath></defs>
  </svg>

  <div class="stage">
    <h1 class="headline">Baby Reveal</h1>
    <p class="subline">Scratch the golden foot to find out…</p>

    <div class="vs"><span class="boy" id="lblBoy">💙 BOY</span><span class="girl" id="lblGirl">GIRL 💗</span></div>

    <div class="foot" id="foot">
      <div class="board"><div class="blue" id="blueBlock"></div></div>

      <div class="scene layer" id="scene">
        <div class="status" id="status">It's&nbsp;a<span class="dots">&thinsp;<span>.</span><span>.</span><span>.</span></span></div>
      </div>

      <canvas id="scratch" class="layer"></canvas>
      <div class="hint" id="hint">✨ scratch me ✨</div>

      <div class="final" id="final">
        <div class="crown">👑</div>
        <div class="blessed">Blessed Parents</div>
        <div class="names">Kyle &amp; Noelene</div>
        <div class="girl">It's a Girl!</div>
        <div class="foot-emoji">🎀👶🏼🎀</div>
      </div>
    </div>

    <button class="replay" id="replay">↺ Play again</button>
  </div>

<script>
(function(){
  "use strict";
  const canvas = document.getElementById('scratch');
  const ctx    = canvas.getContext('2d');
  const hint   = document.getElementById('hint');
  const status = document.getElementById('status');
  const finalEl= document.getElementById('final');
  const replay = document.getElementById('replay');
  const blueBlock = document.getElementById('blueBlock');
  const lblBoy = document.getElementById('lblBoy');
  const lblGirl= document.getElementById('lblGirl');

  const W=300, H=380;
  const dpr=Math.max(1,Math.min(window.devicePixelRatio||1,3));
  let revealing=false, scratching=false, lastX=null, lastY=null;
  let initialGold=1, moveCount=0;

  /* ---------------- sound (synthesised — no files needed) ---------------- */
  let actx=null, master=null;
  function ensureAudio(){
    if(!actx){
      try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
      master=actx.createGain(); master.gain.value=0.9; master.connect(actx.destination);
    }
    if(actx && actx.state==='suspended') actx.resume();
  }
  function tone(freq,start,dur,type,vol){
    if(!actx) return;
    const t0=actx.currentTime+start;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'triangle'; o.frequency.setValueAtTime(freq,t0);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol||0.2,t0+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g).connect(master); o.start(t0); o.stop(t0+dur+0.05);
  }
  function applause(start,dur){
    if(!actx) return;
    const len=Math.floor(actx.sampleRate*dur);
    const buf=actx.createBuffer(1,len,actx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,0.25); }
    const src=actx.createBufferSource(); src.buffer=buf;
    const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2000; bp.Q.value=0.6;
    const g=actx.createGain(); const t0=actx.currentTime+start;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.linearRampToValueAtTime(0.22,t0+0.35);
    g.gain.linearRampToValueAtTime(0.16,t0+dur*0.6);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    src.connect(bp).connect(g).connect(master); src.start(t0); src.stop(t0+dur);
  }
  // little rising chime the moment the foil is cleared
  function playReveal(){ ensureAudio(); [523.25,659.25,783.99].forEach((f,i)=>tone(f,i*0.10,0.28,'triangle',0.18)); }
  // triumphant "congratulations!" fanfare + cheer when the girl wins
  function playCongrats(){
    ensureAudio(); if(!actx) return;
    applause(0,2.8);
    tone(523.25,0.00,0.20,'triangle',0.26);   // C5
    tone(659.25,0.16,0.20,'triangle',0.26);   // E5
    tone(783.99,0.32,0.24,'triangle',0.26);   // G5
    tone(1046.5,0.52,0.70,'triangle',0.30);   // C6  (peak)
    tone(1318.5,0.52,0.70,'sine',0.16);       // + E6 (chord)
    tone(1568.0,0.52,0.70,'sine',0.14);       // + G6 (chord)
    // sparkle
    [1760,2093,2637].forEach((f,i)=>tone(f,0.9+i*0.08,0.18,'sine',0.10));
  }

  const scene=document.getElementById('scene');
  let maskCanvas=null, maskReady=false;

  function buildMask(img){
    const iw=img.naturalWidth, ih=img.naturalHeight, N=iw*ih;
    const t=document.createElement('canvas'); t.width=iw; t.height=ih;
    const tc=t.getContext('2d'); tc.drawImage(img,0,0);
    const src=tc.getImageData(0,0,iw,ih).data;
    const foot=new Uint8Array(N);
    for(let i=0;i<N;i++){ if((src[i*4]+src[i*4+1]+src[i*4+2])/3>110) foot[i]=1; }   // white = foot
    // flood the true background inwards from the borders (through dark pixels only)
    const outside=new Uint8Array(N), st=[];
    for(let x=0;x<iw;x++){ st.push(x,(ih-1)*iw+x); }
    for(let y=0;y<ih;y++){ st.push(y*iw,y*iw+iw-1); }
    while(st.length){ const p=st.pop(); if(outside[p]||foot[p]) continue; outside[p]=1;
      const x=p%iw, y=(p-x)/iw;
      if(x>0)st.push(p-1); if(x<iw-1)st.push(p+1); if(y>0)st.push(p-iw); if(y<ih-1)st.push(p+iw);
    }
    // any dark pixel not reachable from the border is an enclosed hollow -> fill it
    let minx=iw,miny=ih,maxx=0,maxy=0;
    const md=tc.createImageData(iw,ih);
    for(let i=0;i<N;i++){
      if(!foot[i] && !outside[i]) foot[i]=1;
      if(foot[i]){ md.data[i*4]=md.data[i*4+1]=md.data[i*4+2]=md.data[i*4+3]=255;
        const x=i%iw, y=(i-x)/iw; if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; }
    }
    const full=document.createElement('canvas'); full.width=iw; full.height=ih;
    full.getContext('2d').putImageData(md,0,0);
    // fit the foot's bounding box into the W×H card box, centred, with a little padding
    const MS=2, pad=8*MS, bw=maxx-minx+1, bh=maxy-miny+1;
    maskCanvas=document.createElement('canvas'); maskCanvas.width=W*MS; maskCanvas.height=H*MS;
    const mc=maskCanvas.getContext('2d');
    const s=Math.min((W*MS-2*pad)/bw,(H*MS-2*pad)/bh), dw=bw*s, dh=bh*s;
    mc.drawImage(full, minx,miny,bw,bh, (W*MS-dw)/2,(H*MS-dh)/2, dw,dh);
    // use the same silhouette to clip the reveal scene
    const url=maskCanvas.toDataURL();
    scene.style.webkitMaskImage=scene.style.maskImage="url("+url+")";
    maskReady=true;
  }

  /* gold scratch layer (masked to the exact foot) */
  function paintGold(){
    if(!maskReady) return;
    canvas.width=W*dpr; canvas.height=H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='source-over';
    const g=ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,'#e9bd4d'); g.addColorStop(.3,'#fff0b8');
    g.addColorStop(.5,'#e6b53c'); g.addColorStop(.72,'#ffe98f'); g.addColorStop(1,'#c8962b');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    for(let i=0;i<90;i++){
      ctx.globalAlpha=Math.random()*.4;
      ctx.fillStyle=Math.random()>.5?'#fffbe6':'#b98a24';
      const s=Math.random()*3+1; ctx.fillRect(Math.random()*W,Math.random()*H,s,s);
    }
    ctx.globalAlpha=1;
    ctx.globalCompositeOperation='destination-in';   // keep gold only inside the foot silhouette
    ctx.drawImage(maskCanvas,0,0,W,H);
    ctx.globalCompositeOperation='source-over';
    initialGold=goldCount();
  }
  function goldCount(){
    const d=ctx.getImageData(0,0,canvas.width,canvas.height).data;
    let c=0; for(let i=3;i<d.length;i+=4*8){ if(d[i]>10) c++; } return c;
  }
  function clearedFrac(){ return 1 - goldCount()/initialGold; }

  function pos(e){
    const r=canvas.getBoundingClientRect(); const p=e.touches?e.touches[0]:e;
    return { x:(p.clientX-r.left)*(W/r.width), y:(p.clientY-r.top)*(H/r.height) };
  }
  function scratch(e){
    if(!scratching||revealing) return;
    const {x,y}=pos(e);
    ctx.globalCompositeOperation='destination-out';
    ctx.lineWidth=64; ctx.lineCap='round'; ctx.lineJoin='round';
    if(lastX!==null){ ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke(); }
    ctx.beginPath(); ctx.arc(x,y,32,0,Math.PI*2); ctx.fill();
    lastX=x; lastY=y; hint.classList.add('gone');
    if((++moveCount%6)===0 && clearedFrac()>0.4) startReveal();
  }
  function onDown(e){ if(revealing)return; ensureAudio(); scratching=true; lastX=lastY=null; scratch(e); }
  function onMove(e){ if(scratching){ e.preventDefault(); scratch(e); } }
  function onUp(){ if(!scratching)return; scratching=false; lastX=lastY=null;

  window.addEventListener('mouseup',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:true});

  canvas.addEventListener('touchend',onUp);

  /* ---------------- reveal + battle (rectangular blocks) ---------------- */
  function setSeam(blueFrac,ms){
    blueBlock.style.transition='width '+ms+'ms cubic-bezier(.45,.05,.55,.95)';
    blueBlock.style.width=(blueFrac*100)+'%';
    const blueLeads=blueFrac>0.5;
    lblBoy.classList.toggle('lead',blueLeads);
    lblGirl.classList.toggle('lead',!blueLeads);
    status.style.color = blueLeads ? 'var(--blue-deep)' : 'var(--pink-deep)';
    status.style.transform='scale('+(1+Math.random()*0.12)+')';
    return new Promise(r=>setTimeout(r,ms));
  }

      [0.50,260],
      [0.74,240],[0.28,240],
      [0.16,300],[0.86,300],   // frantic swings
      [0.20,300],
      [0.0 ,700]               // PINK WINS
    ];
    for(const [f,ms] of seq){ await setSeam(f,ms); }

    lblBoy.classList.remove('lead'); lblGirl.classList.add('lead');
    status.style.color='var(--pink-deep)';
    finalEl.classList.add('show');
    playCongrats();
    launchConfetti();
    replay.classList.add('show');
  }

  /* ---------------- confetti ---------------- */
  const cc=document.getElementById('confetti'), cx=cc.getContext('2d');
  let parts=[], raf=null;
  function sizeConfetti(){ cc.width=innerWidth; cc.height=innerHeight; }
  sizeConfetti();
  const COLORS=['#ff4f9a','#ffb6d5','#ffd9ea','#fff0f6','#ffc0dc','#e78bb5'];
  function launchConfetti(){
    parts=[];
    for(let i=0;i<170;i++){
      parts.push({x:Math.random()*cc.width,y:-20-Math.random()*cc.height*.5,
        r:Math.random()*7+4,c:COLORS[i%COLORS.length],vy:Math.random()*3+2,
        vx:(Math.random()-.5)*2,rot:Math.random()*6.28,vr:(Math.random()-.5)*.3,
        shape:Math.random()>.5?'rect':'circle'});
    }
    if(!raf) tick();
    setTimeout(()=>{ if(raf)cancelAnimationFrame(raf); raf=null; cx.clearRect(0,0,cc.width,cc.height); },6500);
  }
  function tick(){
    cx.clearRect(0,0,cc.width,cc.height);
    for(const p of parts){
      p.y+=p.vy; p.x+=p.vx; p.rot+=p.vr;
      if(p.y>cc.height+20){ p.y=-20; p.x=Math.random()*cc.width; }
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot); cx.fillStyle=p.c;
      if(p.shape==='rect') cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);
      else{ cx.beginPath(); cx.arc(0,0,p.r/1.4,0,6.28); cx.fill(); }
      cx.restore();
    }
    raf=requestAnimationFrame(tick);
  }

  /* ---------------- replay ---------------- */
  replay.addEventListener('click',()=>{
    revealing=false; scratching=false; moveCount=0;
    blueBlock.style.transition='width .3s linear'; blueBlock.style.width='50%';
    status.style.color=''; status.style.transform='';
    lblBoy.classList.remove('lead'); lblGirl.classList.remove('lead');
    finalEl.classList.remove('show'); replay.classList.remove('show');
    hint.classList.remove('gone'); canvas.classList.remove('gone');
    paintGold();
  });

  window.addEventListener('resize',sizeConfetti);
  window.addEventListener('load',()=>{ setTimeout(paintGold,60); });
  paintGold();
})();
</script>
</body>
</html>
